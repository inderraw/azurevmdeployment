name: Delete Azure VM

on:
  workflow_dispatch:

jobs:
  delete-vm:
    runs-on: ubuntu-latest
    
    steps:
      - name: Login to Azure
        uses: azure/login@v3
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
    
      - name: Force Delete Azure VM
        run: |
           az vm delete --resource-group rg-github-actions-demo --name vm-demo-linux --force-deletion true --yes
