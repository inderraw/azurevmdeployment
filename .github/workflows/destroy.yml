name: Delete Azure VM

on:
  workflow_dispatch:

jobs:
  delete-vm:
    runs-on: ubuntu-latest

    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Delete VM
        run: |
          az vm delete \
            --resource-group rg-github-actions-demo \
            --name vm-demo-linux \
            --yes
