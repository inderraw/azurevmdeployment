name: 'Terraform Destroy Azure VM'

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions UI

permissions:
  contents: read

env:
  ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
  ARM_CLIENT_SECRET: ${{ secrets.ARM_CLIENT_SECRET }}
  ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
  ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
  TF_LOG: INFO # Optional: provides clean logs during the process

jobs:
  terraform-destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest

    # Optional: set default directory if your TF files are in a subdirectory
    # defaults:
    #   run:
    #     working-directory: ./terraform

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: "1.9.0" # Specify your exact required version

    - name: Terraform Init
      run: terraform init

    # Optional but highly recommended: View what will be destroyed first
    - name: Terraform Plan Destroy
      run: terraform plan -destroy

    - name: Terraform Destroy
      run: terraform destroy -auto-approve
